<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Empréstimo</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body id="body_emprestimo">
  
    <script src="../js/menu.js"></script>
    <script src="../js/script.js"></script>
    <h1 class="titulo">Cadastrar Empréstimo</h1>
    <div id="menu-container"></div>

    <div id="menu_emprestimo">
      <input id="aluno" class="in_emprestimo" type="text" placeholder="Nome do aluno">
        <input id="livro" class="in_emprestimo" type="text" placeholder="Nome do livro" readonly>        
        <input id="data_emprestimo" class="in_emprestimo" type="date">
        <label for="Data de empréstimo">Data de empréstimo</label>
        <input id="data_devolucao" class="in_emprestimo" type="date">
        <label for="Data de devolução">Data de devolução</label>
    </div>

    <button class="botao_emprestimo" onclick="cadastrarEmprestimo()">Cadastrar empréstimo</button>

    <div id="footer-container"></div>
</body>
</html>
