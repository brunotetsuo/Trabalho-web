<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo da Biblioteca</title>
    <link rel="stylesheet" href="../cs/style.css">
</head>
<body id="body_catalogo">

  <header>
    <h1>Catálogo da Biblioteca</h1>
  </header>

  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar livro..." onkeyup="buscarLivro()">
  </div>

  <div class="catalogo" >

    <div class="livro">
      <img src="../imagens/machado.png" alt="imagem-livro">
      <h3>Dom Casmurro</h3>
      <p>Autor: Machado de Assis</p>
      <p>Categoria: Romance</p>
      <button id="reserva">Reservar</button>
    </div>

    <div class="livro">
      <img src="../imagens/clean.png" alt="imagem-livro">
      <h3>Clean Code</h3>
      <p>Autor: Robert C. Martin</p>
      <p>Categoria: Tecnologia</p>
      <button id="reserva">Reservar</button>
    </div>

    <div class="livro">
      <img src="../imagens/hobbit.png" alt="imagem-livro">
      <h3>O Hobbit</h3>
      <p>Autor: J.R.R. Tolkien</p>
      <p>Categoria: Fantasia</p>
      <button id="reserva">Reservar</button>
    </div>

  </div>

  <a class="voltar_menu" href="consulta.html">Voltar</a>

</body>
</html>
