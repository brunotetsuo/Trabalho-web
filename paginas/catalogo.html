<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo da Biblioteca</title>
    <link rel="stylesheet" href="../cs/style.css">
</head>
<body id="body_catalogo">

  <script src="../js/menu.js"></script>
  <script src="../js/script.js"></script>

  <header>
    <h1>Catálogo da Biblioteca</h1>
  </header>
  <div id="menu-container"></div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar livro..." onkeyup="buscarLivro()">
  </div>

  <div class="catalogo" >

    <div class="livro">
      <h3>Dom Casmurro</h3>
      <p>Autor: Machado de Assis</p>
      <p>Categoria: Romance</p>
      <button id="reserva">Reservar</button>
      <button class="excluir">X</button>
    </div>

    <div class="livro">
      <h3>Clean Code</h3>
      <p>Autor: Robert C. Martin</p>
      <p>Categoria: Tecnologia</p>
      <button id="reserva">Reservar</button>
      <button class="excluir">X</button>
    </div>

    <div class="livro">
      <h3>O Hobbit</h3>
      <p>Autor: J.R.R. Tolkien</p>
      <p>Categoria: Fantasia</p>
      <button id="reserva">Reservar</button>
      <button class="excluir">X</button>
    </div>

  </div>

  <footer class="footer">
  <div class="footer-container">
    <h2>Contato</h2>

    <div class="contatos">
      <a href="https://instagram.com/seuusuario" target="_blank" class="link">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
        <span>Instagram</span>
      </a>

      <a href="https://wa.me/5599999999999" target="_blank" class="link">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <span>WhatsApp</span>
      </a>
    </div>
  </div>
</footer>

</body>
</html>
