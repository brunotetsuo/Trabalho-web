<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar livro</title>
    <link rel="stylesheet" href="../css/style.css"> 
</head>
<body id="body_adicionar">

    <script src="../js/menu.js"></script>
    <script src="../js/script.js"></script>
    <h1 class="titulo"> Editar livro</h1>
    <div id="menu-container"></div>
    <div id="menu_adicionar">
        <div class="div_adicionar">
            
            <input id="titulo" class="in_adicionar" type="text" placeholder="Título do livro">
            <input id="autor" class="in_adicionar" type="text" placeholder="Autor do livro">
            <input id="categoria" class="in_adicionar" type="text" placeholder="Gênero / Categoria">
            <input id="ano" class="in_adicionar" type="text" placeholder="Ano de publicação">
            <input id="status" class="in_adicionar" type="text" placeholder="Status">
        </div>
    </div>

    <button id="botao_adicionar" onclick="editarLivro()">Editar livro</button>

    <div id="footer-container"></div>
</body>
</html>
