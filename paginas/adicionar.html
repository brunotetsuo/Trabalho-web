<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar livro</title>
    <link rel="stylesheet" href="../cs/style.css"> 
</head>
<body id="body_adicionar">
    <h1 class="titulo"> Adicionar livro</h1>
    <div id="menu_adicionar">
        <div class="div_adicionar">
            <input class="in_adicionar" type="text" placeholder="Título do livro">
            <input class="in_adicionar" type="text" placeholder="Autor do livro">
            <input class="in_adicionar" type="text" placeholder="Editor do livro">
            <input class="in-data" type="date">
        </div>
        <div class="div_adicionar">
            <input class="in_adicionar" type="number" placeholder="ISBN do livro">
            <input class="in_adicionar" type="text" placeholder="Gênero / Categoria">
            <input class="in_adicionar" type="number" placeholder="Número de páginas">
            <input class="in_adicionar" type="text" placeholder="Idioma do livro">
        
        </div>
    </div>

    <button id="botao_adicionar" onclick="adicionarLivro()">Adicionar livro</button>

    

   <a class="voltar_menu" href="menu.html">Voltar para o menu</a>
