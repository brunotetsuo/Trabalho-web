<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../cs/style.css">
</head>
<body class="body_login">

  <div class="container">
    <h1 id="titulo-login">Login do Usuário</h1>

    <form id="form-login" >
      <div class="grupo-campo">
        <label for="id_usuario" class="labell">ID:</label>
        <input type="text" id="id_usuario" name="id" required>
      </div>

      <div class="grupo-campo">
        <label for="senha_login" class="labell">Senha:</label>
        <input type="password" id="senha_login" name="senha" required>
      </div>

      <button type="submit" id="btn-entrar">Entrar</button>
    </form>
  </div>

</body>
</html>
